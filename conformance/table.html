<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>corpus: table</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#555}
  @page{size:1280px 720px;margin:0}
  .slide{width:1280px;height:720px;background:#0f141a;color:#e8eaed;
    font-family:Helvetica,Arial,sans-serif;position:relative;overflow:hidden;
    padding:64px 80px;margin:0 auto}
  h1{font-family:Georgia,serif;font-size:46px;font-weight:400;margin-bottom:30px}
  table{width:100%;border-collapse:collapse;font-size:15px}
  thead th{text-align:left;padding:12px 16px;background:#243041;color:#fff;font-weight:700;
    border-bottom:2px solid #f0b429}
  tbody td{padding:12px 16px;border-bottom:1px solid #2c3440;color:#c3cad1}
  tbody tr:nth-child(even){background:#161c23}
  td.num,th.num{text-align:right}
  td.up{color:#34d399;font-weight:700}
  td.down{color:#f87171;font-weight:700}
  .note{margin-top:18px;font-size:13px;color:#8a939c}
</style>
</head>
<body>

<section class="slide">
  <h1>A data table</h1>
  <table>
    <thead>
      <tr><th>Region</th><th class="num">Q1</th><th class="num">Q2</th><th class="num">Change</th><th>Owner</th></tr>
    </thead>
    <tbody>
      <tr><td>Northern Europe</td><td class="num">4.2</td><td class="num">5.1</td><td class="num up">+21%</td><td>Anna K.</td></tr>
      <tr><td>Southern Europe</td><td class="num">3.8</td><td class="num">3.5</td><td class="num down">−8%</td><td>Marco V.</td></tr>
      <tr><td>North America</td><td class="num">6.0</td><td class="num">7.4</td><td class="num up">+23%</td><td>Dana R.</td></tr>
      <tr><td>Asia Pacific</td><td class="num">2.9</td><td class="num">3.6</td><td class="num up">+24%</td><td>Yuki T.</td></tr>
    </tbody>
  </table>
  <p class="note">Today this becomes text boxes over border bars; Phase 2 turns it into a native PowerPoint table.</p>
</section>

</body>
</html>
